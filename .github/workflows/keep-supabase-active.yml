name: Keep Supabase Active

on:
  schedule:
    # Run once a week at midnight on Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API to keep project active
        run: |
          echo "Pinging Supabase to prevent project pause due to inactivity..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")
          
          if [ "$response" -lt 400 ]; then
            echo "Successfully pinged Supabase API. Status: $response"
            exit 0
          else
            echo "Failed to ping Supabase API. Status: $response"
            # We don't exit with error here because even a failed authenticated request counts as activity,
            # but we echo it for logging purposes.
          fi
