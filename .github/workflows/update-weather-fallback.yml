name: Update Weather Fallback Cache

on:
  schedule:
    # Run every 6 hours (4 times a day, completely free with no limits/keys)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger
  push:
    branches:
      - main
    paths:
      - 'scripts/fetch-fallback-weather.js'
      - '.github/workflows/update-weather-fallback.yml'

jobs:
  update-fallback:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Weather Fallback Data
        run: node scripts/fetch-fallback-weather.js

      - name: Commit and Push Fallback Cache
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/weather-fallback.json
          if git diff --cached --quiet; then
            echo "No changes in fallback weather data."
          else
            git commit -m "chore: update weather fallback cache [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
